<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SIP-STOK GPM Kabupaten Lahat</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
margin:0;
background:#eef1f4;
}

/* HEADER */

header{
background:#2e7d32;
color:white;
text-align:center;
padding:60px 20px;
}

header img{
height:120px;
margin-bottom:15px;
}

header h1{
font-size:42px;
margin:10px;
}

header h2{
font-size:22px;
font-weight:normal;
margin:5px;
}

/* CONTAINER */

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

/* CARD */

.card{
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* INFO BOX */

.info{
background:#e8f5e9;
padding:15px;
border-radius:10px;
font-size:18px;
margin-bottom:25px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
font-size:16px;
}

th{
background:#2e7d32;
color:white;
padding:12px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f5f5f5;
}

/* STATUS */

.tersedia{
background:#00e676;
padding:6px 12px;
border-radius:6px;
font-weight:bold;
}

.menipis{
background:#ffeb3b;
padding:6px 12px;
border-radius:6px;
font-weight:bold;
}

.habis{
background:#ff5252;
color:white;
padding:6px 12px;
border-radius:6px;
font-weight:bold;
}

</style>
</head>

<body>

<header>

<img src="Lambang_Kabupaten_Lahat.jpg">

<h1>SIP-STOK GPM</h1>
<h2>Sistem Informasi Publikasi Stok Gerakan Pangan Murah</h2>
<h2>Pemerintah Kabupaten Lahat</h2>

</header>

<div class="container">

<div class="card">

<div class="info">
📅 Tanggal : <span id="tanggal">Loading...</span><br>
📍 Lokasi : <span id="lokasi">Loading...</span>
</div>

<table id="tabel">

<thead>
<tr>
<th>No</th>
<th>Komoditas</th>
<th>Harga</th>
<th>Stok Awal</th>
<th>Terjual</th>
<th>Sisa</th>
<th>Status</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>
</div>

<script>

const sheet =
"https://docs.google.com/spreadsheets/d/1MGhBSK0F9Xk0r7tIGkxUT3IzkMaUEA0aeLL5xgyGUl8/export?format=csv";

fetch(sheet)
.then(res=>res.text())
.then(data=>{

let rows=data.split("\n").slice(1);
let table=document.querySelector("#tabel tbody");

rows.forEach((row,i)=>{

let col=row.split(",");

if(i==0){
document.getElementById("tanggal").innerText=col[0];
document.getElementById("lokasi").innerText=col[1];
}

let statusClass="tersedia";

if(col[7]=="Menipis") statusClass="menipis";
if(col[7]=="Habis") statusClass="habis";

table.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${col[2]}</td>
<td>Rp ${col[3]}</td>
<td>${col[4]}</td>
<td>${col[5]}</td>
<td>${col[6]}</td>
<td><span class="${statusClass}">${col[7]}</span></td>
</tr>
`;

});

});

</script>

</body>
</html>
