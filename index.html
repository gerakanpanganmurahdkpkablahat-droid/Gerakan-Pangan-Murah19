<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SIP-STOK GPM - Kabupaten Lahat</title>

<style>

body{
font-family: Arial;
margin:0;
background:#e6e8eb;
}

header{
background:#2e7d32;
color:white;
text-align:center;
padding:70px 20px;
}

header img{
height:110px;
margin-bottom:20px;
}

header h1{
font-size:40px;
margin:10px 0;
}

header p{
font-size:20px;
margin:6px 0;
}

.container{
max-width:1050px;
margin:40px auto;
padding:20px;
}

.card{
background:white;
padding:35px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.info-box{
background:#dfe8df;
padding:18px;
border-radius:12px;
margin-bottom:30px;
font-size:20px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2e7d32;
color:white;
padding:12px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

.status-tersedia{
background:#00e676;
padding:6px 12px;
border-radius:8px;
font-weight:bold;
}

.status-menipis{
background:#ffeb3b;
padding:6px 12px;
border-radius:8px;
font-weight:bold;
}

</style>
</head>

<body>

<header>

<img src="Lambang_Kabupaten_Lahat.jpg">

<h1>SIP-STOK GPM</h1>
<p>Sistem Informasi Publikasi Stok Gerakan Pangan Murah</p>
<p>Pemerintah Kabupaten Lahat</p>

</header>

<div class="container">

<div class="card">

<div class="info-box">

📅 Tanggal: <span id="tanggal">Loading...</span><br>
📍 Lokasi: <span id="lokasi">Loading...</span>

</div>

<h2>Informasi Stok Komoditas</h2>

<table id="tabel">

<thead>
<tr>
<th>No</th>
<th>Komoditas</th>
<th>Harga</th>
<th>Stok Awal</th>
<th>Terjual</th>
<th>Sisa</th>
<th>Status</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/1MGhBSK0F9Xk0r7tIGkxUT3IzkMaUEA0aeLL5xgyGUl8/export?format=csv";

fetch(sheetURL)
.then(res => res.text())
.then(data => {

let rows = data.split("\n").slice(1);

let tabel = document.querySelector("#tabel tbody");

rows.forEach((row,i)=>{

let cols = row.split(",");

if(i==0){
document.getElementById("tanggal").innerText = cols[0];
document.getElementById("lokasi").innerText = cols[1];
}

let statusClass = cols[7]=="Menipis" ? "status-menipis" : "status-tersedia";

tabel.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${cols[2]}</td>
<td>Rp ${cols[3]}</td>
<td>${cols[4]}</td>
<td>${cols[5]}</td>
<td>${cols[6]}</td>
<td><span class="${statusClass}">${cols[7]}</span></td>
</tr>
`;

});

});

</script>

</body>
</html>
