<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIP-STOK GPM</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-SEMD8BW957"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-SEMD8BW957');
</script>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#e9ecef;
}

/* HEADER */

header{
background:#2e7d32;
color:white;
text-align:center;
padding:90px 20px;
}

header img{
height:130px;
margin-bottom:20px;
}

header h1{
font-size:48px;
margin:10px 0;
}

header p{
font-size:22px;
margin:5px;
}

/* CONTAINER */

.container{
max-width:1100px;
margin:50px auto;
padding:20px;
}

/* CARD */

.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

/* INFO BOX */

.info{
background:#dfe8df;
padding:20px;
border-radius:10px;
font-size:20px;
font-weight:bold;
margin-bottom:30px;
}

/* JUDUL */

h2{
margin-bottom:15px;
}

/* TABEL */

table{
width:100%;
border-collapse:collapse;
font-size:17px;
}

th{
background:#2e7d32;
color:white;
padding:14px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

/* STATUS WARNA */

.tersedia{
background:#00e676;
padding:6px 12px;
border-radius:6px;
font-weight:bold;
}

.menipis{
background:#ffeb3b;
padding:6px 12px;
border-radius:6px;
font-weight:bold;
}

.habis{
background:#ff5252;
color:white;
padding:6px 12px;
border-radius:6px;
font-weight:bold;
}

/* FOOTER */

footer{
text-align:center;
margin-top:40px;
padding:20px;
font-size:16px;
color:#555;
}

</style>
</head>


<body>

<header>

<img src="Lambang_Kabupaten_Lahat.jpg">

<h1>SIP-STOK GPM</h1>

<p>Sistem Informasi Publikasi Stok Gerakan Pangan Murah</p>
<p>Pemerintah Kabupaten Lahat</p>

</header>


<div class="container">

<div class="card">

<div class="info">

📅 Tanggal : <span id="tanggal">Loading...</span><br>
📍 Lokasi : <span id="lokasi">Loading...</span>

</div>


<h2>Informasi Stok Komoditas</h2>

<table id="tabel">

<thead>
<tr>
<th>No</th>
<th>Komoditas</th>
<th>Harga</th>
<th>Stok Awal</th>
<th>Terjual</th>
<th>Sisa</th>
<th>Status</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>


<footer>
© 2026 Dinas Ketahanan Pangan Kabupaten Lahat
</footer>


<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/1MGhBSK0F9Xk0r7tIGkxUT3IzkMaUEA0aeLL5xgyGUl8/export?format=csv";

fetch(sheetURL)
.then(res => res.text())
.then(data => {

let rows = data.split("\n").slice(1);
let tabel = document.querySelector("#tabel tbody");

rows.forEach((row,i)=>{

let col = row.split(",");

if(i==0){
document.getElementById("tanggal").innerText = col[0];
document.getElementById("lokasi").innerText = col[1];
}

let statusText = col[7].trim().toLowerCase();
let status = "tersedia";

if(statusText=="menipis") status="menipis";
if(statusText=="habis") status="habis";

tabel.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${col[2]}</td>
<td>Rp ${col[3]}</td>
<td>${col[4]}</td>
<td>${col[5]}</td>
<td>${col[6]}</td>
<td><span class="${status}">${col[7]}</span></td>
</tr>
`;

});

});

</script>

</body>
</html>
