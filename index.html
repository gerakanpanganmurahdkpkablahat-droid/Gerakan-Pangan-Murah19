<style>

body{
    font-family: Arial;
    margin:0;
    background:#f4f6f9;
}

/* HEADER */
header{
    text-align:center;
    padding:25px;
    background:#2e7d32;
    color:white;
}

header img{
    height:100px;
    margin-bottom:15px;
}

/* CONTAINER */
.container{
    max-width:1100px;
    margin:40px auto;
    padding:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

/* INFO BOX */
.info-box{
    background:#e8f5e9;
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;
    font-weight:bold;
    font-size:16px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#2e7d32;
    color:white;
    padding:10px;
}

td{
    padding:8px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f1f1f1;
}

/* STATUS WARNA */
.status-tersedia{
    background:#00e676;
    padding:4px 8px;
    border-radius:6px;
    font-weight:bold;
}

.status-menipis{
    background:#ffea00;
    padding:4px 8px;
    border-radius:6px;
    font-weight:bold;
}

.status-habis{
    background:#ff1744;
    color:white;
    padding:4px 8px;
    border-radius:6px;
    font-weight:bold;
}

/* FOOTER */
footer{
    text-align:center;
    background:#2e7d32;
    color:white;
    padding:15px;
    margin-top:40px;
}

</style>
